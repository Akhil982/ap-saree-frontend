<header class="site-header">
  <div class="header-container full-screen-bleed">
    
    <div class="brand-section">
      <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Open Navigation Menu" [class.active]="isMobileMenuOpen">
        <span class="hamburger-bar"></span>
      </button>
      <a routerLink="/" class="logo">
        HOUSE OF JAABILI<span class="luxury-dot">.</span>
      </a>
    </div>

    <nav class="desktop-nav">
      <ul>
        <li><a routerLink="/catalog" [queryParams]="{category: 'all'}" routerLinkActive="active-link">All Sarees</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'banarasi'}" routerLinkActive="active-link">Banarasi</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'kanchipuram'}" routerLinkActive="active-link">Kanchipuram</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'linen'}" routerLinkActive="active-link">Linen & Cotton</a></li>
      </ul>
    </nav>

    <div class="search-box">
      <input type="text" placeholder="Search weaves..." />
      <button class="search-submit-btn" aria-label="Search">
        <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>

    <div class="header-actions">
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Activate Light Mode' : 'Activate Dark Mode'">
        <ng-container *ngIf="!isDarkMode">
          <svg class="theme-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <span class="theme-text">Dark</span>
        </ng-container>
        
        <ng-container *ngIf="isDarkMode">
          <svg class="theme-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.22" x2="5.64" y2="17.88"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <span class="theme-text">Light</span>
        </ng-container>
      </button>

      <div class="profile-display-context" [class.has-identity]="isLoggedIn()">
        <a routerLink="/account" class="action-btn profile-link" aria-label="View Account Details">
          <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
        <div class="identity-popover-badge" *ngIf="isLoggedIn()">
          <span class="user-email-string">{{ getUserEmail() }}</span>
        </div>
      </div>
      
      <a routerLink="/cart" class="action-btn cart-link" aria-label="View Shopping Cart">
        <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </a>
    </div>

  </div>
</header>
