<header class="site-header">
  <div class="header-container full-screen-bleed">
    
    <div class="brand-section">
      <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Open Navigation Menu" [class.active]="isMobileMenuOpen">
        <span class="hamburger-bar"></span>
      </button>
      <a routerLink="/" class="logo">HOUSE OF JAABILI<span class="luxury-dot">.</span></a>
    </div>

    <nav class="desktop-nav center-nav-links">
      <ul>
        <li><a routerLink="/catalog" [queryParams]="{category: 'all'}" routerLinkActive="active-link">All Sarees</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'banarasi'}" routerLinkActive="active-link">Banarasi</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'kanchipuram'}" routerLinkActive="active-link">Kanchipuram</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'linen'}" routerLinkActive="active-link">Linen & Cotton</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <div class="search-box desktop-only">
        <input type="text" placeholder="Search weaves, fabrics..." />
        <span class="search-icon">🔍</span>
      </div>

      <button class="action-btn theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Activate Light Mode' : 'Activate Dark Mode'">
        <span class="mode-icon" *ngIf="isDarkMode">☀️ <small class="theme-text">Light</small></span>
        <span class="mode-icon" *ngIf="!isDarkMode">🌙 <small class="theme-text">Dark</small></span>
      </button>

      <a routerLink="/account" class="action-btn profile-link" aria-label="View Account Details">👤</a>
      
      <a routerLink="/cart" class="action-btn cart-link" aria-label="View Shopping Cart">
        🛒
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </a>
    </div>

  </div>
</header>

<div class="luxury-mobile-drawer" [class.drawer-active]="isMobileMenuOpen">
  <div class="drawer-inner-wrapper">
    <div class="drawer-header-branding">
      <span class="drawer-logo">ZARI<span>.</span></span>
      <button class="close-drawer-trigger" (click)="closeMobileMenu()">✕</button>
    </div>
    
    <nav class="mobile-drawer-nav">
      <ul>
        <li><a routerLink="/catalog" [queryParams]="{category: 'all'}" (click)="closeMobileMenu()">All Sarees</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'banarasi'}" (click)="closeMobileMenu()">Banarasi Collection</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'kanchipuram'}" (click)="closeMobileMenu()">Kanchipuram Silks</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'linen'}" (click)="closeMobileMenu()">Linen & Cotton Fabrics</a></li>
        <li><a routerLink="/new-arrivals" (click)="closeMobileMenu()" class="highlight-arrival">New Arrivals</a></li>
      </ul>
    </nav>

    <div class="drawer-footer-meta">
      <div class="search-box mobile-search">
        <input type="text" placeholder="Search our heritage weaves..." />
      </div>
      <p class="curated-text">Curated Masterpieces for the Modern Connoisseur.</p>
    </div>
  </div>
</div>

<div class="drawer-backdrop-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
