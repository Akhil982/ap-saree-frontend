<header class="site-header">
  <div class="header-container">
    
    <div class="brand-section">
      <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Open Navigation Menu" [class.active]="isMobileMenuOpen">
        <span class="hamburger-bar"></span>
      </button>
      <a routerLink="/" class="logo" (click)="closeMobileMenu()">
        HOUSE OF JAABILI<span class="luxury-dot">.</span>
      </a>
    </div>

    <nav class="desktop-nav">
      <ul>
        <li><a routerLink="/catalog" [queryParams]="{category: 'all'}" routerLinkActive="active-link">All Sarees</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'banarasi'}" routerLinkActive="active-link">Banarasi</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'kanchipuram'}" routerLinkActive="active-link">Kanchipuram</a></li>
        <li><a routerLink="/catalog" [queryParams]="{category: 'linen'}" routerLinkActive="active-link">Linen & Cotton</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      
      <div class="search-box">
        <input type="text" placeholder="Search..." class="search-input" />
        <button class="search-submit-btn" aria-label="Search">
          <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>

      <button class="theme-toggle" (click)="toggleTheme()">
        <ng-container *ngIf="!isDarkMode">
          <svg class="theme-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </ng-container>
        <ng-container *ngIf="isDarkMode">
          <svg class="theme-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle></svg>
        </ng-container>
      </button>

      <div class="profile-display-context">
        <button class="action-btn profile-link" (click)="toggleProfileDropdown($event)">
          <div class="profile-icon-wrapper">
            <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="status-indicator-badge success-tick" *ngIf="isLoggedIn()">✓</span>
            <span class="status-indicator-badge error-cross" *ngIf="!isLoggedIn()">✕</span>
          </div>
        </button>
        
        <div class="identity-popover-badge" [class.dropdown-active]="isProfileDropdownOpen">
          <ng-container *ngIf="isLoggedIn()">
            <span class="user-email-string">{{ getUserEmail() }}</span>
            <button class="auth-action-btn logout-variant" (click)="logout()">Sign Out</button>
          </ng-container>
          <ng-container *ngIf="!isLoggedIn()">
            <a routerLink="/auth/login" class="auth-action-btn login-variant" (click)="isProfileDropdownOpen = false">Sign In</a>
          </ng-container>
        </div>
      </div>
      
      <a routerLink="/cart" class="action-btn cart-link">
        <svg class="nav-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
      </a>
    </div>
  </div>

  <div class="mobile-navigation-drawer" [class.drawer-open]="isMobileMenuOpen">
    <div class="mobile-drawer-backdrop" (click)="closeMobileMenu()"></div>
    <nav class="mobile-drawer-content">
      <ul class="mobile-nav-links">
        <li><a routerLink="/catalog" (click)="closeMobileMenu()">All Sarees</a></li>
        <li><a routerLink="/catalog" (click)="closeMobileMenu()">Banarasi</a></li>
      </ul>
    </nav>
  </div>
</header>
