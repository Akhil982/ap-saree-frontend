<div class="app-container">
  
  <app-header></app-header>

  <!-- The backdrop blurs only if they aren't logged in AND haven't explicitly skipped as a guest -->
  <main class="main-content" [class.blur-store-backdrop]="shouldShowAuthOverlay()">
    <router-outlet></router-outlet>
  </main>

</div>

<!-- Uses the updated condition checking rule matrix -->
<div class="store-auth-overlay-modal" *ngIf="shouldShowAuthOverlay()">
  <app-auth></app-auth>
</div>
